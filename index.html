<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maximizing Your AI Learning Journey</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/home.css">
</head>
<body>

  <main class="hero">
    <!-- decorative vector grid -->
    <svg class="hero__grid" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <defs>
        <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
          <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#dcfce7" stroke-width="1"/>
        </pattern>
        <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="white" stop-opacity="0"/>
          <stop offset="100%" stop-color="white" stop-opacity="1"/>
        </linearGradient>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)"/>
      <rect width="100%" height="100%" fill="url(#fade)"/>
    </svg>

    <div class="hero__content">
      <span class="hero__badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2l2.4 7.2L22 12l-7.6 2.8L12 22l-2.4-7.2L2 12l7.6-2.8z"/>
        </svg>
        AI Adoption Guide
      </span>

      <h1 class="hero__title">Maximizing Your <em>AI Learning</em> Journey</h1>

      <p class="hero__subtitle">
        A practical, step-by-step guide to adopting Claude across your organization —
        from configuration and skills to agents, hooks, and beyond.
      </p>

      <a class="hero__cta" href="tutorial.html">
        Let&rsquo;s Start Now
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </a>

      <p class="hero__footnote">No sign-up. No installs. Just learn.</p>
    </div>
  </main>

</body>
</html>
